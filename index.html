<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Sadoori ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #ff8fb1, #ffb6c1);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #ff4d79;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #ffe6ee;
        }
    </style>
</head>
<body>

    <h1>Hey Sadoori ❤️<br>Click on this button!</h1>

    <button onclick="showLove()">
        Click Me 💖
    </button>

    <script>
        function showLove() {
            alert("I Love You ❤️");
        }
    </script>

</body>
</html>
